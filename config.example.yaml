listen_addr: ":8080"
public_url: "https://docs.example.com"   # public base URL; used in protected-resource metadata + WWW-Authenticate
snapshot_retention: 10
bleve_index_path: "./data/index.bleve"
session_timeout: 2m                        # reap idle Streamable HTTP sessions after this; must be positive
max_request_bytes: 4194304                 # cap request body bytes on the MCP endpoint (4 MiB); oversized requests are rejected

logging:
  level: info                              # debug | info | warn | error
  format: json                             # json | text
  client_ip_header: ""                     # e.g. "X-Forwarded-For" behind a proxy; empty = use RemoteAddr

database:
  driver: sqlite                          # sqlite | mysql | postgres
  # sqlite REQUIRES _pragma=foreign_keys(1) in the DSN: foreign keys are off by default,
  # and the server fails fast at startup without it (cascade deletes would orphan rows).
  dsn: "file:./data/docstore.db?_pragma=foreign_keys(1)"

# oidc: the UPSTREAM identity provider that this server's own OAuth authorization server
# federates login to. mcp-docstore is now its own OAuth issuer (see the oauth: block
# below); this block is only the "log in via my company IdP" leg of that flow.
#
# Register exactly ONE confidential OIDC client on your IdP for this server, with a redirect
# URI of "{public_url}/oauth/callback" (using public_url above). That single upstream client
# is shared by every downstream MCP client and the web BFF — they never talk to the IdP
# directly, only to this server's own /oauth/authorize, /oauth/token, etc.
oidc:
  issuer: "https://idp.example.com"
  client_id: "docstore-upstream-client-id"
  client_secret: "docstore-upstream-client-secret"
  scopes: ["openid", "profile", "email", "groups", "offline_access"]  # defaults shown; requested from the upstream IdP at login
  # offline_access is required for token refresh: the upstream IdP app must be granted it so
  # the IdP returns a refresh token. Without it, refreshes fail once the cached provider token
  # lapses and clients must re-authenticate.
  discovery_timeout: 15s                            # bounds OIDC discovery + JWKS refresh HTTP calls
  # allow_private_ip: set true ONLY if the upstream IdP resolves to an RFC-1918 or loopback
  # address (e.g. an internal Dex/Keycloak on your LAN). Relaxes SSRF protection on the
  # discovery/token/JWKS HTTP calls to that IdP and is logged as a warning at startup.
  # allow_private_ip: false
  # root_ca: PEM file of additional CA certificates to trust for the upstream IdP's TLS
  # connections. Use this for an internal IdP whose certificate isn't signed by a public CA.
  # root_ca: "/etc/mcp-docstore/idp-ca.pem"

# oauth: configures the embedded OAuth authorization server (always on — this server issues
# its own access/refresh tokens after federating login to oidc: above).
oauth:
  access_token_ttl: 1h        # lifetime of issued access tokens (default 1h)
  refresh_token_ttl: 720h     # lifetime of issued refresh tokens (default 720h / 30 days)
  registration: "open"        # "open" (default; any client may dynamically register) | "allowlist"
  # registration_allowlist: exact-match https:// redirect URIs admitted to dynamic client
  # registration when registration is "allowlist". Required (>=1 entry) in that mode; ignored
  # otherwise.
  # registration_allowlist:
  #   - "https://client.example.com/callback"
  trust_proxy: false          # trust proxy-supplied X-Forwarded-* headers for client IP/scheme
  trusted_proxy_count: 1      # number of trusted proxy hops to peel off when trust_proxy is true

tenants:
  - key: acme
    name: "Acme Corp"
    match:
      domains: ["acme.com", "acme.io"]
      emails: ["contractor@gmail.com"]
    admins: ["alice@acme.com"]            # tenant admins (declarative; reconciled at login)

# web: optional BFF config for web UI sessions. When present, enables the web UI at "/";
# when absent, the web UI is disabled. The BFF is a first-party client of the embedded
# authorization server above (auto-seeded on boot), so it needs no OAuth client credentials
# or redirect URL of its own — only session cookie/timeout knobs.
#web:
#  cookie_secure: true          # secure (HTTPS-only) cookies; default true. Set false ONLY for local http development
#  idle_timeout: 24h            # reap idle sessions after this duration (default 24h)
#  absolute_timeout: 168h       # absolute session lifetime (default 168h / 7 days)
#  sweep_interval: 1h           # interval to reap expired sessions (default 1h)
