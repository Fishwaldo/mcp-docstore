name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to (re)release, e.g. v0.4.0"
        required: true
        type: string

permissions:
  contents: write   # create the GitHub Release + upload assets
  packages: write   # push the image to GHCR

jobs:
  # Resolve the tag once: the pushed tag for `push`, or the input for a manual run.
  # All other jobs key off this so a workflow_dispatch (where github.ref is a branch,
  # not the tag) still targets the correct release.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          if [ -z "$tag" ]; then echo "::error::no tag resolved"; exit 1; fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Releasing $tag"

  binaries:
    needs: prepare
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.prepare.outputs.tag }}
        run: |
          bin="mcp-docstore"
          [ "$GOOS" = "windows" ] && bin="mcp-docstore.exe"
          ldflags="-s -w -X github.com/Fishwaldo/mcp-docstore/cmd/server.Version=${VERSION}"
          go build -trimpath -ldflags="$ldflags" -o "dist/$bin" .

      - name: Package
        run: |
          version="${{ needs.prepare.outputs.tag }}"
          base="mcp-docstore_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          cp README.md config.example.yaml dist/
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "../${base}.zip" mcp-docstore.exe README.md config.example.yaml
          else
            tar -czf "../${base}.tar.gz" mcp-docstore README.md config.example.yaml
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error
          retention-days: 1

  # One job creates/updates the Release and attaches every archive. Doing this once
  # (rather than per-matrix-job) avoids the concurrent "release already_exists" race.
  release:
    needs: [prepare, binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: artifacts/*
          generate_release_notes: true

  docker:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # value= overrides the source ref so semver tags work on manual dispatch too.
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.tag }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ needs.prepare.outputs.tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# AI release notes run in a separate workflow (release-notes.yml) on workflow_run, because
# claude-code-action rejects the "push" event that triggers this Release workflow.
