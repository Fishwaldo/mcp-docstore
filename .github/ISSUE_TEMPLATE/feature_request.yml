name: Feature request
description: Suggest a new tool, behaviour, or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For large changes please describe the problem first — this helps frame the discussion before jumping to a solution.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're hitting.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? New MCP tool, changed behaviour, config option, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this hasn't been requested before.
          required: true
        - label: This fits within the project scope (MCP document store, not a general-purpose file server).
          required: true
