name: Bug report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure with ...
        2. Call tool `create_document` with ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: mcp-docstore version
      placeholder: "v0.4.2"
    validations:
      required: true

  - type: input
    id: go_version
    attributes:
      label: Go version
      placeholder: "go1.26.3"

  - type: dropdown
    id: database
    attributes:
      label: Database driver
      options:
        - sqlite
        - mysql
        - postgres
        - not applicable

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any slog JSON output (redact tokens and credentials).
      render: text
